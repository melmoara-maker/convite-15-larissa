<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Convite interativo dos 15 anos da Larissa"
    >

    <title>15 Anos da Larissa</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="convite">

        <section class="capa" id="inicio">

            <div class="estrelas" aria-hidden="true"></div>

            <div class="conteudo-capa">

                <p class="convite-especial">
                    Você é meu convidado especial<br>
                    para celebrar meus
                </p>

                <div class="idade">
                    <span class="numero">15</span>
                    <span class="anos">Anos</span>
                </div>

                <h1>Larissa</h1>

                <p class="descricao">
                    Uma noite de sonhos, encanto e<br>
                    sofisticação espera por você...
                </p>

                <button
                    type="button"
                    class="botao-abrir"
                    id="botaoAbrir"
                >
                    Toque para abrir o convite
                </button>

                <span class="coracao" aria-hidden="true">♥</span>

            </div>

            <div class="area-castelo" aria-hidden="true">
                <div class="castelo-provisorio">♛</div>
            </div>

        </section>

    </main>

    <script src="script.js"></script>

</body>
</html>
